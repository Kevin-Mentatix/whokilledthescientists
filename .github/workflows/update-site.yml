name: Update Site

on:
  schedule:
    - cron: '3 14 * * *'   # 7:03 AM MT (UTC-7)
    - cron: '57 23 * * *'  # 4:57 PM MT (UTC-7)
  workflow_dispatch: {}     # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat <<'PROMPT'
          You are updating the site whokilledthescientists.com.

          1. Read UPDATE_INSTRUCTIONS.md for the full site structure and update process.
          2. Search the web for news from the last 24 hours about:
             - Missing or dead scientists connected to US classified programs
             - NASA JPL, LANL, Wright-Patterson, KCNSC, nuclear labs
             - Congressional action (Burlison, Comer, Oversight Committee)
             - FBI investigation into missing scientists
             - UAP disclosure and connected scientist deaths
             - These specific people: Michael Hicks, Frank Maiwald, Monica Reza, Anthony Chavez, Melissa Casias, Steven Garcia, Matthew Sullivan, Amy Eskridge, Nuno Loureiro, Carl Grillmair, Neil McCasland, Jason Thomas, David Wilcock
             - Any NEW scientists or researchers connected to classified programs who have died or gone missing
          3. Compare findings to existing content in index.html
          4. If new developments are found:
             - Add to Recent Developments section (top of list)
             - Update the "Updated" date in the developments section header
             - If new person: add card, detail data, timeline entry, node map entry
             - If new person: download their photo to images/ folder
             - If status change on existing person: update their card and detail data
             - If new institutional connection: update institutions section and node map edges
             - Update header stats if case counts change
          5. Only add verified, sourced information. Every claim must have a linked source.
          6. Maintain the existing editorial tone: factual, investigative, not conspiratorial.
          7. If no new developments found, make no changes.
          8. Output a brief summary of what was found and changed (or "No updates needed").
          PROMPT
          )"

      - name: Commit and push if changed
        run: |
          git config user.name "hal-updater"
          git config user.email "hal@whokilledthescientists.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit."
          fi
